name: Terraform Destroy Resource
description: 'GitHub Action to destroy Terraform resources.'

inputs:
  work-dir:
    description: 'The working directory where the Terraform configuration files are located.'
    required: false
    default: './terra-config'
  build-id:
    description: "Build ID for the Artifacts"
    required: true
  aws-access-key-id:
    description: AWS Access Key ID
    required: true
  aws-secret-access-key:
    description: AWS Secret Access Key
    required: true
  aws-region:
    description: AWS region
    required: false
    default: 'ap-south-1'
  aws-account-id:
    description: AWS account ID
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Download Terraform Plan
      uses: actions/download-artifact@v3
      with:
        name: tfplan-${{ inputs.build-id }}
        path: ${{ inputs.work-dir }}
    
    - name: Terraform Destroy
      run: terraform destroy tfplan -auto-approve
      shell: bash
      working-directory: ${{ inputs.work-dir }}