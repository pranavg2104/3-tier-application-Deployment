name: Destroy Workflow
description: This workflow runs on workflow call

on:
  workflow_dispatch:
    inputs:
      build-id:
          description: "Build ID for the Artifacts"
          required: true

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout
          uses: actions/checkout@v3

        - uses: ./.github/actions/tf-destroy
          with:
            build-id: ${{ github.event.inputs.build-id }}
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: 'ap-south-1'
            aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}